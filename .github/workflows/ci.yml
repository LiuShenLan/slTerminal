name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy check
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint check
        run: npx eslint src/

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

      - name: Frontend unit tests (L2)
        run: npm test

      - name: Terminal render tests (L3)
        run: npm run test:l3

      - name: Backend build
        working-directory: src-tauri
        run: cargo build

      - name: Backend tests (L1)
        working-directory: src-tauri
        run: cargo test

      - name: Tauri debug build
        run: npm run tauri build -- --debug --no-bundle

      - name: E2E tests (L4)
        run: npm run wdio
