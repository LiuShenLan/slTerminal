name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy check
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint check
        run: npx eslint src/

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

      # 安全守卫：生产构建必须已 tree-shake E2E helper（VITE_E2E 未设 → E2E_ENABLED=false）。
      # installAllE2eHelpers / __slterm_e2e_createProject 仅存在于 e2e-tests/helpers.ts；
      # 若命中说明门控失效、测试后门泄漏进生产二进制 → 失败构建。
      # 注意：__slterm_e2e_projectPending 是生产代码合法读取的标志，不在此列。
      - name: Guard — 生产 dist 不含 E2E helper
        shell: pwsh
        run: |
          $hits = Select-String -Path dist/assets/*.js -SimpleMatch -Pattern 'installAllE2eHelpers','__slterm_e2e_createProject'
          if ($hits) {
            $hits | ForEach-Object { Write-Host $_.Line }
            throw "E2E helper 泄漏进生产 dist——门控失效"
          }
          Write-Host "OK: 生产 dist 不含 E2E helper"

      - name: Frontend unit tests (L2)
        run: npm test

      - name: Terminal render tests (L3)
        run: npm run test:l3

      - name: Backend build
        working-directory: src-tauri
        run: cargo build

      - name: Backend tests (L1)
        working-directory: src-tauri
        run: cargo test -- --test-threads=1

      # E2E 二进制：设 VITE_E2E=1 使前端 vite build 保留 E2E helper（否则 wdio 卡"Workspace 未就绪"）
      - name: Tauri debug build (E2E-enabled)
        run: npm run tauri build -- --debug --no-bundle
        env:
          VITE_E2E: '1'

      - name: E2E tests (L4)
        run: npm run wdio
